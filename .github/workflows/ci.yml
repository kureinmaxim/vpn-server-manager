name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  # Позволяет запускать вручную
  workflow_dispatch:

# Ограничиваем количество одновременных runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: [3.11]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v7
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Smoke check (зависимости ставятся, ключ генерируется)
      run: |
        python generate_key.py
      env:
        PYTHONIOENCODING: utf-8

# Прежний job `build` удалён: он ничего не собирал (реальный билд закомментирован),
# только ставил pyinstaller, а macos-раннер давал разовые инфра-сбои (Failed to load
# action manifest) → ложные «упавшие» письма. Сборка инсталляторов — локально
# (build_windows.ps1 / build_macos.py), см. BUILD.md.
